<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TONEDEF APPS | OFFBEAT TECH. STAY LOUD.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gum-rubber: #BA9C7D;
            --offbeat-black: #111111;
            --ska-white: #FFFFFF;
            --concrete-gray: #CCCCCC;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--concrete-gray);
            color: var(--offbeat-black);
            font-family: 'Space Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .brand-font {
            font-family: 'Anton', sans-serif;
            text-transform: uppercase;
        }

        /* Main Container */
        main {
            width: 100%;
            max-width: 800px;
            background-color: var(--ska-white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            border-left: 20px solid var(--offbeat-black);
            border-right: 20px solid var(--offbeat-black);
        }

        /* Hero Section */
        header {
            padding: 60px 20px;
            text-align: center;
            border-bottom: 2px solid var(--offbeat-black);
        }

        .rude-boy-logo {
            width: 120px;
            height: 120px;
            background-color: var(--gum-rubber);
            border: 8px solid var(--offbeat-black);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px auto;
            font-family: 'Anton', sans-serif;
            font-size: 4rem;
            color: var(--offbeat-black);
            box-shadow: 6px 6px 0px var(--offbeat-black);
        }

        h1 {
            font-size: 4.5rem;
            line-height: 0.9;
            margin-bottom: 10px;
        }

        .tagline {
            font-size: 1.2rem;
            font-weight: 700;
            background-color: var(--offbeat-black);
            color: var(--ska-white);
            display: inline-block;
            padding: 5px 15px;
        }

        /* Minimal Content */
        .content {
            flex-grow: 1;
            padding: 60px 40px;
            text-align: center;
        }

        .vertical-beat {
            font-size: 1.5rem;
            letter-spacing: 10px;
            writing-mode: vertical-rl;
            text-orientation: upright;
            margin: 40px auto;
            color: var(--offbeat-black);
            font-weight: 900;
        }

        /* Checkerboard footer effect */
        .checker-base {
            height: 60px;
            background-image: 
                linear-gradient(45deg, var(--offbeat-black) 25%, transparent 25%), 
                linear-gradient(-45deg, var(--offbeat-black) 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, var(--offbeat-black) 75%),
                linear-gradient(-45deg, transparent 75%, var(--offbeat-black) 75%);
            background-size: 30px 30px;
            background-position: 0 0, 0 15px, 15px -15px, -15px 0px;
            background-color: var(--gum-rubber);
            border-top: 4px solid var(--offbeat-black);
        }

        footer {
            background-color: var(--offbeat-black);
            color: var(--ska-white);
            padding: 40px;
            text-align: center;
        }

        .stay-loud {
            font-size: 3rem;
            color: var(--gum-rubber);
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            main { border-width: 10px; }
        }
    </style>
</head>
<body>

<main>
    <header>
        <div class="rude-boy-logo">T</div>
        <h1 class="brand-font">TONEDEF<br>APPS</h1>
        <p class="tagline brand-font">OFFBEAT TECH. STAY LOUD.</p>
    </header>

    <div class="content">
        <p>Specialized platform implementation & healthcare interoperability.</p>
        
        <div class="vertical-beat brand-font">TAPS</div>
    </div>

    <div class="checker-base"></div>
    
    <footer>
        <div class="stay-loud brand-font">STAY LOUD</div>
        <p style="margin-top: 10px; font-size: 0.7rem; opacity: 0.6;">GILBERT, AZ // 2026</p>
    </footer>
</main>

</body>
</html>
