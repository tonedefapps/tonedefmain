<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToneDef Apps | Offbeat Tech. Stay Loud.</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gum: #BA9C7D;
            --black: #111111;
            --white: #FFFFFF;
            --gray: #CCCCCC;
            --font-head: 'Anton', sans-serif;
            --font-body: 'Space Mono', monospace;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--black);
            color: var(--white);
            font-family: var(--font-body);
            margin: 0;
            scroll-behavior: smooth;
        }
        h1, h2, h3 { font-family: var(--font-head); text-transform: uppercase; margin: 0; }
        a { text-decoration: none; color: inherit; transition: 0.2s; }

        /* NAV */
        nav {
            position: fixed;
            width: 100%;
            top: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 40px;
            background: rgba(17,17,17,0.95);
            border-bottom: 3px solid var(--gum);
            z-index: 100;
            backdrop-filter: blur(6px);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.4rem;
            font-family: var(--font-head);
            letter-spacing: 2px;
            color: var(--gum);
        }
        .logo svg { height: 44px; width: auto; }
        .nav-links {
            display: flex;
            gap: 30px;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
        .nav-links a:hover { color: var(--gum); }

        /* HERO */
        #home {
            min-height: 100vh;
            background-color: var(--gum);
            color: var(--black);
            display: grid;
            grid-template-columns: 1fr auto;
            grid-template-rows: 1fr auto;
            padding: 90px 80px 0;
        }
        .hero-text {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 24px;
            padding-bottom: 60px;
        }
        .hero-headline {
            font-family: var(--font-head);
            font-size: clamp(4rem, 11vw, 9rem);
            line-height: 0.88;
            text-transform: uppercase;
        }
        .hero-sub {
            font-size: 0.85rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: bold;
        }
        .btn {
            display: inline-block;
            padding: 14px 36px;
            font-family: var(--font-head);
            font-size: 1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: 2px solid var(--black);
            background: var(--black);
            color: var(--gum);
            align-self: flex-start;
        }
        .btn:hover { background: transparent; color: var(--black); }

        .hero-vbeat {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 0 60px 60px;
        }
        .hero-vbeat svg { width: clamp(180px, 24vw, 340px); height: auto; }

        .hero-checker {
            grid-column: 1 / -1;
            height: 36px;
            background: repeating-conic-gradient(var(--black) 0% 25%, var(--gum) 0% 50%) 0 0 / 36px 36px;
        }

        /* SECTION DIVIDERS */
        .checker-divider {
            height: 24px;
            background: repeating-conic-gradient(var(--gum) 0% 25%, var(--black) 0% 50%) 0 0 / 24px 24px;
        }

        /* ABOUT */
        #about {
            background: var(--black);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 100px 40px;
        }
        .section-hat { width: 72px; margin-bottom: 32px; }
        .content-box {
            max-width: 820px;
            text-align: left;
            border-left: 5px solid var(--gum);
            padding-left: 30px;
        }
        .content-box h2 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            margin-bottom: 20px;
            color: var(--gum);
        }
        .content-box p { line-height: 1.8; font-size: 1rem; margin-bottom: 16px; }
        .highlight { color: var(--gum); font-weight: bold; }

        /* APPS */
        #apps {
            background: #181818;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 100px 40px;
            text-align: center;
            gap: 8px;
        }
        #apps > h2 { font-size: clamp(2.5rem, 6vw, 4rem); margin-bottom: 4px; }
        .section-sub {
            color: var(--gray);
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 36px;
        }
        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            width: 100%;
            max-width: 860px;
            gap: 2px;
            background: var(--gum);
            border: 2px solid var(--gum);
        }
        .app-card {
            background: var(--black);
            padding: 40px;
            text-align: left;
            transition: background 0.2s;
        }
        .app-card:hover { background: #1c1c1c; }
        .card-rule { width: 28px; height: 4px; background: var(--gum); margin-bottom: 20px; }
        .app-card h3 { font-size: 2.2rem; margin-bottom: 10px; }
